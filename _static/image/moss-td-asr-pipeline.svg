<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 130" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="880" height="130" fill="#F5F5F5" rx="4"/>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0.5, 7 3, 0 5.5" fill="#555"/>
    </marker>
  </defs>

  <!-- Waveform -->
  <g transform="translate(20, 65)">
    <rect x="0"  y="-4"  width="4" height="8"  rx="1" fill="#333"/>
    <rect x="7"  y="-8"  width="4" height="16" rx="1" fill="#333"/>
    <rect x="14" y="-14" width="4" height="28" rx="1" fill="#333"/>
    <rect x="21" y="-18" width="4" height="36" rx="1" fill="#333"/>
    <rect x="28" y="-14" width="4" height="28" rx="1" fill="#333"/>
    <rect x="35" y="-20" width="4" height="40" rx="1" fill="#333"/>
    <rect x="42" y="-16" width="4" height="32" rx="1" fill="#333"/>
    <rect x="49" y="-20" width="4" height="40" rx="1" fill="#333"/>
    <rect x="56" y="-14" width="4" height="28" rx="1" fill="#333"/>
    <rect x="63" y="-18" width="4" height="36" rx="1" fill="#333"/>
    <rect x="70" y="-8"  width="4" height="16" rx="1" fill="#333"/>
    <rect x="77" y="-4"  width="4" height="8"  rx="1" fill="#333"/>
  </g>
  <text x="60" y="110" text-anchor="middle" font-size="13" fill="#555" font-weight="bold">Waveform</text>

  <!-- Arrow -->
  <line x1="105" y1="65" x2="133" y2="65" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Mel → Encoder -->
  <rect x="140" y="18" width="195" height="94" rx="10" fill="#FFE8A8" stroke="#C8A050" stroke-width="1.8"/>
  <text x="237" y="52" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Whisper Encoder</text>
  <text x="237" y="72" text-anchor="middle" font-size="11" fill="#777" font-weight="bold">Mel 80 bins → 24L Transformer</text>
  <text x="237" y="90" text-anchor="middle" font-size="11" fill="#777" font-weight="bold">→ Merge 4x → Adaptor MLP</text>

  <!-- Arrow -->
  <line x1="340" y1="65" x2="368" y2="65" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Continuous Hidden States -->
  <rect x="375" y="18" width="220" height="94" rx="10" fill="#FFF8E1" stroke="#C8A050" stroke-width="1.5"/>
  <text x="485" y="48" text-anchor="middle" font-size="15" fill="#333" font-weight="bold">Continuous Embeddings</text>
  <rect x="393" y="58" width="184" height="20" rx="4" fill="#FFE8A8"/>
  <text x="485" y="73" text-anchor="middle" font-size="10.5" fill="#8A6D2B" font-weight="bold" font-family="'SF Mono', 'Menlo', monospace">0.23  −1.47  0.89  2.01 ···</text>
  <text x="485" y="96" text-anchor="middle" font-size="11" fill="#888" font-weight="bold">float32 vectors, d = 1024</text>

  <!-- Arrow -->
  <line x1="600" y1="65" x2="628" y2="65" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- LLM → Text -->
  <rect x="635" y="18" width="220" height="94" rx="10" fill="#D4B8A8" stroke="#907058" stroke-width="1.8"/>
  <text x="745" y="50" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Qwen3 LLM</text>
  <text x="745" y="72" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">Prefill → AR Decode</text>
  <text x="745" y="92" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">→ Transcript with speakers</text>
</svg>
